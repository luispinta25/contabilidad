<div class="diezmo-module">
    <section class="diezmo-section">
        <header class="diezmo-section-header">
            <div>
                <h2><i class="fas fa-hand-holding-heart"></i> Fondo de diezmo</h2>
                <p>Movimientos independientes de la caja diaria.</p>
            </div>
            <div class="diezmo-balance"><span>Saldo del fondo</span><strong id="diezmoSaldo">$0.00</strong></div>
        </header>
        <form id="diezmoMovimientoForm" class="diezmo-form">
            <div class="form-control"><label for="diezmoFecha">Fecha</label><input id="diezmoFecha" type="date" required></div>
            <div class="form-control"><label for="diezmoTipo">Movimiento</label><select id="diezmoTipo" required><option value="ingreso">Ingreso / donativo entrante</option><option value="salida">Salida / donativo saliente</option></select></div>
            <div class="form-control"><label for="diezmoOrigen">Origen</label><select id="diezmoOrigen" required><option value="diezmo">Diezmo</option><option value="donativo">Donativo</option></select></div>
            <div class="form-control"><label for="diezmoMonto">Monto</label><input id="diezmoMonto" type="number" min="0.01" step="0.01" inputmode="decimal" placeholder="0.00" required></div>
            <div class="form-control diezmo-observaciones"><label for="diezmoObservaciones">Observación (opcional)</label><input id="diezmoObservaciones" type="text" maxlength="300" placeholder="Detalle del movimiento"></div>
            <div class="form-actions diezmo-actions"><button class="btn-success" type="submit"><i class="fas fa-plus"></i> Registrar movimiento</button></div>
        </form>
        <div id="diezmoAlert" class="module-alerts"></div>
    </section>
    <section class="diezmo-section">
        <header class="diezmo-section-header"><div><h3><i class="fas fa-list"></i> Historial del fondo</h3><p id="diezmoHistorialResumen">Cargando movimientos...</p></div></header>
        <div id="diezmoLoading" class="diezmo-loading"><i class="fas fa-spinner fa-spin"></i><span>Cargando historial...</span></div>
        <div class="diezmo-table-wrapper"><table class="diezmo-table"><thead><tr><th>Fecha</th><th>Movimiento</th><th>Origen</th><th>Observación</th><th>Registrado por</th><th>Monto</th></tr></thead><tbody id="diezmoHistorialBody"></tbody></table></div>
    </section>
</div>

<style>
.diezmo-module{min-height:100%;overflow:auto;padding:clamp(18px,3vw,34px);display:flex;flex-direction:column;gap:24px;background:radial-gradient(circle at 8% 0,#fff5ca 0,transparent 25%),linear-gradient(135deg,#f8fafc 0%,#f1f5f9 100%)}
.diezmo-section{background:rgba(255,255,255,.96);border:1px solid #e2e8f0;border-radius:18px;padding:clamp(20px,3vw,30px);box-shadow:0 10px 28px rgba(15,23,42,.07)}
.diezmo-section:first-child{border-top:4px solid #fbc318}
.diezmo-section-header{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:24px}.diezmo-section-header h2,.diezmo-section-header h3{margin:0;color:#111827;letter-spacing:-.02em}.diezmo-section-header h2{font-size:clamp(1.35rem,2.5vw,1.8rem)}.diezmo-section-header h2 i{color:#c78f00;margin-right:8px}.diezmo-section-header h3{font-size:1.1rem}.diezmo-section-header h3 i{color:#64748b;margin-right:7px}.diezmo-section-header p{margin:7px 0 0;color:#64748b;font-size:.93rem}
.diezmo-balance{min-width:190px;padding:13px 17px;text-align:right;color:#79620c;font-size:.74rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;background:linear-gradient(135deg,#fff9df,#fff1af);border:1px solid #f7d96b;border-radius:14px}.diezmo-balance strong{display:block;margin-top:3px;color:#1f2937;font-size:1.65rem;line-height:1.15;letter-spacing:-.04em;text-transform:none}
.diezmo-form{display:grid;grid-template-columns:repeat(4,minmax(145px,1fr));gap:18px;align-items:end;padding:20px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px}.diezmo-form .form-control{margin:0}.diezmo-form label{display:block;margin-bottom:7px;color:#334155;font-size:.79rem;font-weight:800}.diezmo-form input,.diezmo-form select{width:100%;min-height:44px;padding:10px 12px;border:1px solid #cbd5e1;border-radius:9px;background:#fff;color:#1e293b;font:inherit;transition:border-color .18s,box-shadow .18s}.diezmo-form input:focus,.diezmo-form select:focus{outline:0;border-color:#d6a500;box-shadow:0 0 0 3px rgba(251,195,24,.22)}.diezmo-observaciones{grid-column:span 3}.diezmo-actions{margin:0}.diezmo-actions .btn-success{min-height:44px;width:100%;border-radius:9px;background:#166534;font-weight:800;box-shadow:0 5px 12px rgba(22,101,52,.18)}.diezmo-actions .btn-success:hover{background:#14532d;transform:translateY(-1px)}
.diezmo-loading{display:flex;align-items:center;gap:9px;color:#64748b;padding:12px 0}.diezmo-table-wrapper{overflow:auto;border:1px solid #e2e8f0;border-radius:12px}.diezmo-table{width:100%;border-collapse:collapse;min-width:780px;background:#fff}.diezmo-table th,.diezmo-table td{padding:14px 16px;border-bottom:1px solid #e8edf3;text-align:left;font-size:.88rem}.diezmo-table th{color:#475569;background:#f8fafc;font-size:.72rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase}.diezmo-table tbody tr{transition:background .15s}.diezmo-table tbody tr:hover{background:#fffcf0}.diezmo-table tbody tr:last-child td{border-bottom:0}.diezmo-badge{display:inline-flex;border-radius:999px;padding:4px 10px;font-size:.75rem;font-weight:800}.diezmo-badge.ingreso{background:#dcfce7;color:#166534}.diezmo-badge.salida{background:#fee2e2;color:#b91c1c}.diezmo-monto-ingreso{color:#166534;font-weight:800}.diezmo-monto-salida{color:#b91c1c;font-weight:800}#diezmoAlert{margin-top:16px}
@media(max-width:860px){.diezmo-form{grid-template-columns:repeat(2,minmax(0,1fr))}.diezmo-observaciones{grid-column:span 2}}@media(max-width:600px){.diezmo-module{padding:14px;gap:14px}.diezmo-section{padding:18px;border-radius:14px}.diezmo-section-header{flex-direction:column;gap:12px;margin-bottom:18px}.diezmo-balance{width:100%;text-align:left}.diezmo-form{grid-template-columns:1fr;padding:15px;gap:13px}.diezmo-observaciones{grid-column:auto}.diezmo-table th,.diezmo-table td{padding:12px}.diezmo-table{min-width:720px}}
</style>

<script>
(function(){'use strict';let movimientos=[];function escapeHtml(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}function formatDateOnly(v){const d=new Date(`${v}T12:00:00`);return Number.isNaN(d.getTime())?v:d.toLocaleDateString('es-EC',{year:'numeric',month:'2-digit',day:'2-digit'})}function showAlert(type,message){const el=document.getElementById('diezmoAlert');if(el)el.innerHTML=message?`<div class="alert alert-${type}">${message}</div>`:''}function render(){const body=document.getElementById('diezmoHistorialBody'),saldo=document.getElementById('diezmoSaldo'),resumen=document.getElementById('diezmoHistorialResumen');const balance=movimientos.reduce((n,m)=>n+(m.tipo==='salida'?-Number(m.monto||0):Number(m.monto||0)),0);saldo.textContent=formatCurrency(balance);saldo.style.color=balance<0?'#b91c1c':'#166534';resumen.textContent=movimientos.length?`${movimientos.length} movimiento${movimientos.length===1?'':'s'} registrado${movimientos.length===1?'':'s'}.`:'Aún no hay movimientos registrados.';body.innerHTML=movimientos.length?movimientos.map(m=>{const ingreso=m.tipo==='ingreso',monto=`${ingreso?'+':'-'}${formatCurrency(Math.abs(Number(m.monto||0)))}`;return `<tr><td>${formatDateOnly(m.fecha)}</td><td><span class="diezmo-badge ${ingreso?'ingreso':'salida'}">${ingreso?'Ingreso':'Salida'}</span></td><td>${escapeHtml(m.origen==='donativo'?'Donativo':'Diezmo')}</td><td>${escapeHtml(m.observaciones||'-')}</td><td>${escapeHtml(m.registrado_por_nombre||m.registrado_por_email||'-')}</td><td class="${ingreso?'diezmo-monto-ingreso':'diezmo-monto-salida'}">${monto}</td></tr>`}).join(''):'<tr><td colspan="6">No hay movimientos en el historial.</td></tr>'}async function load(){document.getElementById('diezmoLoading').style.display='flex';try{movimientos=await getMovimientosDiezmo();render()}catch(e){console.error(e);showAlert('danger','No se pudo cargar el historial del fondo.')}finally{document.getElementById('diezmoLoading').style.display='none'}}async function submit(e){e.preventDefault();const fecha=document.getElementById('diezmoFecha').value,tipo=document.getElementById('diezmoTipo').value,origen=document.getElementById('diezmoOrigen').value,monto=Number(document.getElementById('diezmoMonto').value||0),observaciones=document.getElementById('diezmoObservaciones').value.trim()||null;if(!fecha||monto<=0){showAlert('warning','Completa una fecha y un monto válido.');return}try{await crearMovimientoDiezmo({fecha,tipo,origen,monto:Number(monto.toFixed(2)),observaciones,registrado_por:window.currentUser?.id||null,registrado_por_email:window.currentUser?.email||null,registrado_por_nombre:`${window.userNombres||''} ${window.userApellidos||''}`.trim()||null});e.target.reset();document.getElementById('diezmoFecha').value=toISODateString(new Date());showAlert('success','Movimiento registrado correctamente.');await load()}catch(error){console.error(error);showAlert('danger',error.message||'No se pudo registrar el movimiento.')}}window.initDiezmo=function(){document.getElementById('diezmoFecha').value=toISODateString(new Date());document.getElementById('diezmoMovimientoForm').addEventListener('submit',submit);load()}})();
</script>
